version: "3.9"

services:
  # ── FastAPI Application ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: app
    container_name: airsense-api
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - ARTIFACTS_PATH=artifacts
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    volumes:
      - ./artifacts:/app/artifacts
      - ./mlruns:/app/mlruns
      - ./datasets:/app/datasets:ro
    depends_on:
      - mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - airsense-net
    restart: unless-stopped

  # ── MLflow Tracking Server ───────────────────────────────────────────────────
  mlflow:
    build:
      context: .
      target: app
    container_name: airsense-mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri file:///app/mlruns --default-artifact-root file:///app/mlruns
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
    networks:
      - airsense-net
    restart: unless-stopped

  # ── Prefect Server ───────────────────────────────────────────────────────────
  prefect:
    image: prefecthq/prefect:2-python3.10
    container_name: airsense-prefect
    command: prefect server start --host 0.0.0.0 --port 4200
    ports:
      - "4200:4200"
    environment:
      - PREFECT_API_URL=http://0.0.0.0:4200/api
    networks:
      - airsense-net
    restart: unless-stopped

  # ── Premium Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: airsense-frontend
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - airsense-net
    restart: unless-stopped

networks:
  airsense-net:
    driver: bridge
